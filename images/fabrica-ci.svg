<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="300" viewBox="0 0 1080 300">
  <defs>
    <marker id="arrow-main" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f5c62"/>
    </marker>
    <marker id="arrow-loop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b56576"/>
    </marker>
    <style>
      .box { fill: #eef8fa; stroke: #1f5c62; stroke-width: 2.5; rx: 14; ry: 14; }
      .decision { fill: #fff4d6; stroke: #b08968; stroke-width: 2.5; }
      .loop { fill: #fde8eb; stroke: #b56576; stroke-width: 2.5; rx: 14; ry: 14; }
      .label { font-family: Arial, sans-serif; font-size: 19px; fill: #1f2933; text-anchor: middle; dominant-baseline: middle; }
      .small { font-size: 16px; }
      .main { stroke: #1f5c62; stroke-width: 4; fill: none; marker-end: url(#arrow-main); }
      .back { stroke: #b56576; stroke-width: 4; fill: none; marker-end: url(#arrow-loop); }
    </style>
  </defs>

  <rect class="box" x="30" y="112" width="160" height="62"/>
  <text class="label" x="110" y="143">Suite E2E</text>

  <rect class="box" x="240" y="112" width="190" height="62"/>
  <text class="label" x="335" y="143">Preparation par seed</text>

  <rect class="box" x="480" y="112" width="150" height="62"/>
  <text class="label" x="555" y="143">Fabrica</text>

  <rect class="box" x="680" y="112" width="190" height="62"/>
  <text class="label" x="775" y="143">Execution realiste</text>

  <polygon class="decision" points="960,92 1030,143 960,194 890,143"/>
  <text class="label small" x="960" y="137">Signal</text>
  <text class="label small" x="960" y="156">fiable ?</text>

  <rect class="box" x="880" y="24" width="160" height="44"/>
  <text class="label small" x="960" y="46">CI sur develop</text>

  <rect class="loop" x="560" y="234" width="330" height="44"/>
  <text class="label small" x="725" y="256">Reprendre donnees, indexation ou scenarios</text>

  <path class="main" d="M 190 143 L 240 143"/>
  <path class="main" d="M 430 143 L 480 143"/>
  <path class="main" d="M 630 143 L 680 143"/>
  <path class="main" d="M 870 143 L 890 143"/>
  <path class="main" d="M 960 92 L 960 68"/>
  <path class="back" d="M 960 194 L 960 256 L 890 256"/>
</svg>
